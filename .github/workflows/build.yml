name: Build and Release Windows EXE

# Запускать workflow при создании нового тега, начинающегося с 'v' (v1.0.0, v1.2.3...)
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    # Запускать сборку на операционной системе Windows [citation:3][citation:6]
    runs-on: windows-latest

    steps:
      # 1. Загрузить код репозитория в виртуальную машину
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Установить Python [citation:3][citation:10]
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Установить все зависимости из requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. Собрать .exe файл с помощью PyInstaller [citation:3]
      #    --onefile: создает один exe файл
      #    --noconsole: убирает консольное окно (для приложений с GUI)
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --noconsole main.py

      # 5. Загрузить готовый .exe как часть релиза на GitHub [citation:3]
      - name: Create Release and Upload EXE
        uses: softprops/action-gh-release@v1
        with:
          files: dist/main.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
